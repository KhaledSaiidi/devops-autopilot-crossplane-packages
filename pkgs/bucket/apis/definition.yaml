apiVersion: apiextensions.crossplane.io/v1
kind: CompositeResourceDefinition
metadata:
  name: xbuckets.devops-autopilot-crossplane-packages.io
spec:
  defaultCompositeDeletePolicy: Foreground
  group: devops-autopilot-crossplane-packages.io
  defaultCompositionRef:
    name: bucket-aws-composition
  names:
    kind: XBucket
    plural: xbuckets
  claimNames:
    kind: Bucket
    plural: buckets
  versions:
    - name: v1alpha1
      served: true
      referenceable: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              properties:
                managementPolicies:
                  type: array
                  default:
                    - "*"
                  description: |-
                    Management actions that the Crossplane controllers
                    can take on the external resource.
                  items:
                    type: string
                    description: |-
                      Management actions that the Crossplane controllers
                      can take on the external resource.
                    enum:
                      - Observe
                      - Create
                      - Update
                      - Delete
                      - LateInitialize
                      - "*"
                parameters:
                  type: object
                  properties:
                    namePrefix:
                      type: string
                      description: Prefix used to generate the bucket name
                    region:
                      type: string
                      description: Region where the bucket will be created
                    resourceGroupName:
                      type: string
                      description: Azure resource group name (for Azure provider)
                      default: default-rg
                    storageEncrypted:
                      type: boolean
                      default: true
                      description: Whether storage encryption is enabled
                    versioning:
                      type: boolean
                      default: false
                      description: Whether versioning is enabled for the bucket
                    publishConfig:
                      type: object
                      description: Configuration for publishing bucket metadata for consumers
                      properties:
                        namespace:
                          type: string
                          description: Namespace where the ConfigMap will be created
                        name:
                          type: string
                          description: Name of the ConfigMap to create
                      required:
                        - namespace
                    tags:
                      type: object
                      description: Tags to apply to the underlying cloud resources
                      additionalProperties:
                        type: string
                    publicAccess:
                      type: boolean
                      default: false
                      description: Whether public access is allowed
                    cloudProviderConfigRef:
                      type: string
                      description: Reference to the provider config to use for this bucket
                    cmProviderConfigRef:
                      type: string
                      description: Reference to the provider config to use for the generated ConfigMap
                  required:
                    - namePrefix
                    - region
                    - cloudProviderConfigRef
                    - cmProviderConfigRef
                    - publishConfig
              required:
                - parameters
            status:
              type: object
              properties:
                bucketName:
                  type: string
                  description: Actual bucket name used by the composed AWS bucket.
                endpoint:
                  type: string
                  description: Computed S3 endpoint URL for the bucket.    
          required:
            - spec