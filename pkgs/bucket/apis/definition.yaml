apiVersion: apiextensions.crossplane.io/v2
kind: CompositeResourceDefinition
metadata:
  name: xbuckets.devops-autopilot-crossplane-packages.io
spec:
  scope: Namespaced
  defaultCompositeDeletePolicy: Foreground
  group: devops-autopilot-crossplane-packages.io
  defaultCompositionRef:
    name: bucket-aws-composition
  names:
    kind: XBucket
    plural: xbuckets
  versions:
    - name: v1alpha1
      served: true
      referenceable: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              properties:
                managementPolicies:
                  type: array
                  default:
                    - "*"
                  description: |-
                    Management actions that the Crossplane controllers
                    can take on the external resource.
                  items:
                    type: string
                    description: |-
                      Management actions that the Crossplane controllers
                      can take on the external resource.
                    enum:
                      - Observe
                      - Create
                      - Update
                      - Delete
                      - LateInitialize
                      - "*"
                parameters:
                  type: object
                  properties:
                    namePrefix:
                      type: string
                      description: Prefix used to generate the bucket name
                    region:
                      type: string
                      description: Region where the bucket will be created
                    resourceGroupName:
                      type: string
                      description: Azure resource group name (for Azure provider)
                      default: default-rg
                    versioning:
                      type: boolean
                      default: false
                      description: Whether versioning is enabled for the bucket
                    tags:
                      type: object
                      description: Tags to apply to the underlying cloud resources
                      additionalProperties:
                        type: string
                    publicAccess:
                      type: boolean
                      default: false
                      description: Whether public access is allowed
                    cloudProviderConfigRef:
                      type: string
                      description: Reference to the provider config to use for this bucket
                  required:
                    - namePrefix
                    - region
                    - cloudProviderConfigRef
              required:
                - parameters
            status:
              type: object
              properties:
                bucketName:
                  type: string
                  description: Actual bucket or container name used by the composed storage resource.
                endpointURL:
                  type: string
                  description: Endpoint URL observed from the composed storage resource.
          required:
            - spec
