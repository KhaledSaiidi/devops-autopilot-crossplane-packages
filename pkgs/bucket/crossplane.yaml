      version: ">=v2.5.0"
    - provider: xpkg.upbound.io/upbound/provider-kubernetes
      version: ">=v1.2.2"
    - function: xpkg.crossplane.io/crossplane-contrib/function-patch-and-transform
      version: ">=v0.8.2"